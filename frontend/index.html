<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Modern login page with theme switcher - Light, Dark, and Brota Green themes">
  <title>Login - Theme Switcher</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Floating particles for Brota theme -->
  <div class="particles">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      <!-- Theme Switcher -->
      <div class="theme-switcher">
        <button class="theme-btn active" data-theme="light" aria-label="Switch to light theme">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"></circle>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
          </svg>
          <span>Light</span>
        </button>
        <button class="theme-btn" data-theme="dark" aria-label="Switch to dark theme">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <span>Dark</span>
        </button>
        <button class="theme-btn" data-theme="brota" aria-label="Switch to Brota green theme">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M12 2a10 10 0 0 1 0 20c-5.52 0-10-4.48-10-10 0-4.42 2.87-8.17 6.84-9.49C10.25 2.17 11.11 2 12 2z"></path>
            <path d="M12 2c1.66 2.85 2.61 6.14 2.61 9.5 0 3.36-.95 6.65-2.61 9.5"></path>
            <path d="M8 12c0-2.5.5-4.87 1.39-7"></path>
          </svg>
          <span>Brota</span>
        </button>
      </div>

      <!-- Header -->
      <div class="login-header">
        <h1>Welcome back</h1>
        <p>Enter your credentials to access your account</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <div class="input-wrapper">
            <input 
              type="email" 
              id="email" 
              class="form-input" 
              placeholder="name@example.com"
              required
              autocomplete="email"
            >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <input 
              type="password" 
              id="password" 
              class="form-input" 
              placeholder="Enter your password"
              required
              autocomplete="current-password"
            >
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
          </div>
        </div>

        <button type="submit" class="submit-btn">
          Sign in
        </button>
      </form>

      <!-- Footer -->
      <div class="divider">or</div>
      
      <div class="login-footer">
        <a href="#">Forgot your password?</a>
        <p style="margin-top: 12px; color: var(--text-secondary); font-size: 14px;">
          Don't have an account? <a href="#">Sign up</a>
        </p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
